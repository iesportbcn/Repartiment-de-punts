<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Repartiment de punts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#FAF8F3;
  --card:#FFFFFF;
  --ink:#1C2128;
  --ink-soft:#5A6470;
  --line:#E8E2D6;
  --line-strong:#D8D0BF;
  --teal:#0E6B6B;
  --teal-dk:#0A4F4F;
  --teal-soft:#E3EFEE;
  --coral:#F2603B;
  --coral-soft:#FDEAE3;
  --gold:#C98A1F;
  --gold-soft:#FBF1DC;
  --green:#2F8F5B;
  --green-soft:#E4F2EA;
  --red:#C0392B;
  --red-soft:#FBE7E4;
  --radius:16px;
  --shadow:0 1px 2px rgba(28,33,40,.04),0 8px 24px rgba(28,33,40,.06);
  --shadow-lg:0 12px 40px rgba(28,33,40,.14);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Hanken Grotesk',system-ui,sans-serif;
  color:var(--ink);
  background:
    radial-gradient(1200px 600px at 100% -10%, var(--teal-soft) 0%, transparent 55%),
    radial-gradient(900px 500px at -10% 110%, var(--gold-soft) 0%, transparent 50%),
    var(--paper);
  background-attachment:fixed;
  -webkit-font-smoothing:antialiased;
  line-height:1.5;
}
h1,h2,h3,h4,.brand,.display{font-family:'Bricolage Grotesque',sans-serif;letter-spacing:-.01em}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit;font-size:15px}
a{color:var(--teal)}
.hidden{display:none!important}

/* ---------- LOGIN ---------- */
.login-wrap{min-height:100vh;display:grid;grid-template-columns:1.1fr 1fr}
.login-hero{
  background:linear-gradient(150deg,var(--teal-dk),var(--teal));
  color:#fff;padding:64px 56px;display:flex;flex-direction:column;justify-content:space-between;
  position:relative;overflow:hidden;
}
.login-hero::after{
  content:"";position:absolute;inset:0;
  background:radial-gradient(700px 400px at 80% 120%, rgba(242,96,59,.35), transparent 60%);
}
.login-hero > *{position:relative;z-index:1}
.hero-logo{display:flex;align-items:center;gap:14px;font-family:'Bricolage Grotesque';font-weight:800;font-size:22px}
.hero-logo .scale{width:42px;height:42px}
.hero-mid h1{font-size:clamp(34px,4vw,52px);font-weight:800;line-height:1.02;margin-bottom:18px}
.hero-mid p{font-size:17px;max-width:30ch;opacity:.9}
.hero-feats{display:flex;flex-direction:column;gap:12px;margin-top:28px}
.hero-feats div{display:flex;align-items:center;gap:10px;font-size:14.5px;opacity:.92}
.hero-feats span{display:grid;place-items:center;width:26px;height:26px;border-radius:8px;background:rgba(255,255,255,.16);font-size:13px}
.hero-foot{font-size:13px;opacity:.7}
.login-panel{display:flex;align-items:center;justify-content:center;padding:40px}
.login-card{width:100%;max-width:380px}
.login-card h2{font-size:26px;font-weight:700;margin-bottom:6px}
.login-card .sub{color:var(--ink-soft);margin-bottom:26px;font-size:15px}
.field{margin-bottom:16px}
.field label{display:block;font-size:13px;font-weight:600;color:var(--ink-soft);margin-bottom:6px}
.field input,.field select,.field textarea{
  width:100%;padding:12px 14px;border:1.5px solid var(--line-strong);border-radius:12px;background:#fff;color:var(--ink);transition:border .15s,box-shadow .15s;
}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 4px var(--teal-soft)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 18px;border-radius:12px;font-weight:700;font-size:15px;transition:transform .08s,filter .15s,background .15s}
.btn:active{transform:translateY(1px)}
.btn-primary{background:var(--teal);color:#fff;width:100%}
.btn-primary:hover{background:var(--teal-dk)}
.btn-coral{background:var(--coral);color:#fff}
.btn-coral:hover{filter:brightness(.95)}
.btn-ghost{background:var(--card);color:var(--ink);border:1.5px solid var(--line-strong)}
.btn-ghost:hover{border-color:var(--teal);color:var(--teal)}
.btn-sm{padding:7px 12px;font-size:13px;border-radius:10px}
.btn-danger{background:var(--red-soft);color:var(--red)}
.btn-danger:hover{background:var(--red);color:#fff}
.login-error{background:var(--red-soft);color:var(--red);padding:10px 12px;border-radius:10px;font-size:13.5px;margin-bottom:14px;font-weight:600}
.demo-box{margin-top:26px;border-top:1px dashed var(--line-strong);padding-top:18px}
.demo-box .t{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-soft);margin-bottom:10px}
.demo-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.demo-chip{text-align:left;padding:9px 11px;border:1.5px solid var(--line);border-radius:11px;background:var(--card);transition:.15s}
.demo-chip:hover{border-color:var(--teal);background:var(--teal-soft)}
.demo-chip b{display:block;font-size:13px;font-weight:700}
.demo-chip small{font-size:11.5px;color:var(--ink-soft)}

/* ---------- APP SHELL ---------- */
.shell{display:grid;grid-template-columns:248px 1fr;min-height:100vh}
.sidebar{background:#0E1518;color:#fff;padding:22px 16px;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.side-brand{display:flex;align-items:center;gap:11px;padding:6px 8px 20px;font-family:'Bricolage Grotesque';font-weight:800;font-size:18px}
.side-brand .scale{width:34px;height:34px}
.nav{display:flex;flex-direction:column;gap:3px;margin-top:6px}
.nav-section{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:#6B7A80;padding:14px 12px 6px;font-weight:700}
.nav-item{display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:11px;color:#C4CDD1;font-size:14.5px;font-weight:600;text-align:left;width:100%;transition:.13s}
.nav-item:hover{background:rgba(255,255,255,.07);color:#fff}
.nav-item.active{background:var(--teal);color:#fff}
.nav-item .ic{font-size:17px;width:20px;text-align:center}
.side-foot{margin-top:auto;border-top:1px solid rgba(255,255,255,.1);padding-top:14px}
.side-user{display:flex;align-items:center;gap:11px;padding:6px 8px}
.avatar{display:grid;place-items:center;width:38px;height:38px;border-radius:11px;background:var(--coral);color:#fff;font-weight:800;font-size:15px;flex-shrink:0}
.side-user .nm{font-size:14px;font-weight:700;line-height:1.2}
.side-user .rl{font-size:11.5px;color:#8A969B}
.logout{margin-top:10px;width:100%;color:#C4CDD1;font-size:13.5px;font-weight:600;padding:9px;border-radius:10px;text-align:left;display:flex;gap:9px;align-items:center}
.logout:hover{background:rgba(192,57,43,.2);color:#fff}

.main{padding:34px 40px 60px;max-width:1100px}
.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:26px;flex-wrap:wrap}
.page-head h1{font-size:30px;font-weight:800}
.page-head .crumb{font-size:13px;color:var(--ink-soft);font-weight:600;margin-bottom:3px}
.page-head .actions{display:flex;gap:10px}

.role-banner{display:inline-flex;align-items:center;gap:8px;font-size:12px;font-weight:700;padding:5px 11px;border-radius:30px;margin-bottom:14px}
.rb-admin{background:#211A2E;color:#D9C9FF}
.rb-teacher{background:var(--teal-soft);color:var(--teal-dk)}
.rb-coord{background:var(--coral-soft);color:var(--coral)}
.rb-student{background:var(--gold-soft);color:var(--gold)}

/* cards / grid */
.grid{display:grid;gap:18px}
.g2{grid-template-columns:repeat(2,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px}
.card h3{font-size:17px;font-weight:700;margin-bottom:4px}
.card .desc{color:var(--ink-soft);font-size:13.5px;margin-bottom:14px}
.stat{display:flex;flex-direction:column;gap:2px}
.stat .v{font-family:'Bricolage Grotesque';font-size:34px;font-weight:800;line-height:1}
.stat .l{font-size:13px;color:var(--ink-soft);font-weight:600}
.stat .ic{font-size:22px;margin-bottom:8px}

.section-title{font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);margin:30px 0 14px}

/* tables / lists */
.list{display:flex;flex-direction:column;gap:10px}
.row-item{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--card);border:1px solid var(--line);border-radius:13px;box-shadow:var(--shadow)}
.row-item .grow{flex:1;min-width:0}
.row-item .ttl{font-weight:700;font-size:15px}
.row-item .meta{font-size:12.5px;color:var(--ink-soft)}
.tag{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:20px}
.tag-teal{background:var(--teal-soft);color:var(--teal-dk)}
.tag-gold{background:var(--gold-soft);color:var(--gold)}
.tag-coral{background:var(--coral-soft);color:var(--coral)}
.tag-green{background:var(--green-soft);color:var(--green)}
.tag-red{background:var(--red-soft);color:var(--red)}
.tag-grey{background:#EEF0F2;color:var(--ink-soft)}

.empty{text-align:center;padding:50px 20px;color:var(--ink-soft)}
.empty .ic{font-size:40px;opacity:.5;margin-bottom:10px}

/* tabs */
.tabs{display:flex;gap:6px;border-bottom:1.5px solid var(--line);margin-bottom:22px;flex-wrap:wrap}
.tab{padding:10px 16px;font-weight:700;font-size:14.5px;color:var(--ink-soft);border-bottom:2.5px solid transparent;margin-bottom:-1.5px;transition:.13s}
.tab:hover{color:var(--ink)}
.tab.active{color:var(--teal);border-color:var(--teal)}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(20,25,30,.5);backdrop-filter:blur(3px);display:grid;place-items:center;z-index:50;padding:20px}
.modal{background:var(--card);border-radius:18px;box-shadow:var(--shadow-lg);width:100%;max-width:520px;max-height:88vh;overflow:auto;padding:28px}
.modal.wide{max-width:680px}
.modal h2{font-size:22px;font-weight:800;margin-bottom:4px}
.modal .msub{color:var(--ink-soft);font-size:14px;margin-bottom:20px}
.modal-foot{display:flex;gap:10px;justify-content:flex-end;margin-top:22px}

/* chat */
.chat-box{display:flex;flex-direction:column;height:460px}
.chat-msgs{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:12px;padding:4px 4px 10px}
.msg{max-width:78%;padding:10px 13px;border-radius:14px;font-size:14px;background:#F1F3F2;align-self:flex-start}
.msg.mine{align-self:flex-end;background:var(--teal);color:#fff}
.msg .who{font-size:11.5px;font-weight:700;margin-bottom:3px;opacity:.85;display:flex;gap:7px;align-items:center}
.msg .tm{font-size:10.5px;opacity:.6;margin-top:4px}
.chat-input{display:flex;gap:10px;border-top:1px solid var(--line);padding-top:12px}
.chat-input input{flex:1}

/* eval grid */
.evtable{width:100%;border-collapse:collapse;font-size:14px}
.evtable th,.evtable td{padding:11px 12px;text-align:left;border-bottom:1px solid var(--line)}
.evtable th{font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-soft);font-weight:700}
.evtable td.num{font-weight:700;font-family:'Bricolage Grotesque'}
.points-in{width:90px;text-align:center;font-weight:700;padding:8px}
.budget-meter{display:flex;align-items:center;justify-content:space-between;background:var(--gold-soft);border:1px solid var(--gold);border-radius:12px;padding:12px 16px;margin:16px 0;font-weight:700}
.budget-meter.ok{background:var(--green-soft);border-color:var(--green);color:var(--green)}
.budget-meter.bad{color:var(--gold)}
.crit-cell{display:flex;gap:5px}
.crit-cell button{width:34px;height:34px;border-radius:9px;border:1.5px solid var(--line-strong);font-weight:700;background:#fff;color:var(--ink-soft)}
.crit-cell button.sel{background:var(--teal);color:#fff;border-color:var(--teal)}
.scale-legend{font-size:12.5px;color:var(--ink-soft);margin-bottom:14px}

.bar{height:9px;background:#EEF0F2;border-radius:20px;overflow:hidden}
.bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--teal),var(--green));border-radius:20px}

.notice{padding:13px 16px;border-radius:12px;font-size:14px;margin-bottom:18px;display:flex;gap:10px;align-items:flex-start}
.notice .ic{font-size:18px}
.n-info{background:var(--teal-soft);color:var(--teal-dk)}
.n-warn{background:var(--gold-soft);color:var(--gold)}
.n-ok{background:var(--green-soft);color:var(--green)}

.help{font-size:12.5px;color:var(--ink-soft);margin-top:5px}
.inline-form{display:grid;gap:14px}
.f-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.method-pick{display:grid;gap:12px}
.method-opt{border:1.5px solid var(--line-strong);border-radius:14px;padding:16px;cursor:pointer;transition:.13s}
.method-opt:hover{border-color:var(--teal)}
.method-opt.sel{border-color:var(--teal);background:var(--teal-soft)}
.method-opt b{font-size:15px;display:flex;align-items:center;gap:9px}
.method-opt p{font-size:13px;color:var(--ink-soft);margin-top:5px}
.method-opt .badge{font-size:11px;background:#fff;border:1px solid var(--line);padding:2px 8px;border-radius:20px;font-weight:700}

@media (max-width:860px){
  .login-wrap{grid-template-columns:1fr}
  .login-hero{display:none}
  .shell{grid-template-columns:1fr}
  .sidebar{position:fixed;bottom:0;left:0;right:0;top:auto;height:auto;flex-direction:row;padding:8px;z-index:40;align-items:center;overflow-x:auto}
  .side-brand,.nav-section,.side-foot .side-user .rl{display:none}
  .nav{flex-direction:row;margin:0}
  .nav-item .lbl{display:none}
  .nav-item{padding:11px}
  .side-foot{margin:0;border:none;padding:0}
  .logout{width:auto}
  .main{padding:20px 16px 90px}
  .g2,.g3{grid-template-columns:1fr}
  .f-row{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div id="root"></div>

<script>
/* ============================================================
   REPARTIMENT DE PUNTS
   App d'avaluació entre iguals per a treballs en grup.
   Fitxer únic · sense dependències · llest per portar a GAS.
   ============================================================ */

const SCALE_SVG = `<svg class="scale" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M24 6v34" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
  <path d="M12 12h24" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
  <circle cx="24" cy="7" r="3.4" fill="currentColor"/>
  <path d="M12 12 6 24h12L12 12Z" stroke="currentColor" stroke-width="2.4" stroke-linejoin="round"/>
  <path d="M36 12 30 24h12l-6-12Z" stroke="currentColor" stroke-width="2.4" stroke-linejoin="round"/>
  <path d="M17 40h14" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
</svg>`;

/* ---------- ESTAT / API ---------- */
const GAS_URL = 'https://script.google.com/macros/s/AKfycby2zJA0nQrAgPZXyqp5Y20TR5vSG5Q1j4WdRsAcyKTYogdeDUWUAT9CEe629yXMBBBI0Q/exec';

function gasGet(action, params={}){
  const qs = new URLSearchParams({action, ...params}).toString();
  return fetch(GAS_URL + '?' + qs)
    .then(r => r.json())
    .then(d => { if(d && d.error) throw new Error(d.error); return d; });
}
function gasPost(data){
  return fetch(GAS_URL, { method:'POST', body: JSON.stringify(data) })
    .then(r => r.json())
    .then(d => { if(d && d.error) throw new Error(d.error); return d; });
}

let SESSION = null;

/* persistència de configuració (usuaris, grups, tasques) */
function save(){
  gasPost({ action:'saveStateBulk', stateJson: JSON.stringify({users:state.users, groups:state.groups}) })
    .then(syncState).catch(persistErr);
}
function syncState(s){ if(s && s.groups){ state=s; render(); } }
function persistErr(e){ console.error('Error desant:', e); }
function refreshNow(){ gasGet('loadState').then(syncState).catch(persistErr); }

function seed(){
  return {
    users:[
      {id:'u_admin', name:'Direcció Centre', email:'admin@institut.cat', pass:'admin', role:'admin', classe:''},
      {id:'u_prof',  name:'Iván (Professor)', email:'ivan@institut.cat',  pass:'prof',  role:'teacher', classe:''},
      {id:'u_prof2', name:'Marta Roca',        email:'marta@institut.cat', pass:'prof',  role:'teacher', classe:''},
      {id:'u_s1', name:'Anna Ferrer',  email:'anna@alumnes.cat',  pass:'1234', role:'student', classe:'A'},
      {id:'u_s2', name:'Bru Soler',    email:'bru@alumnes.cat',   pass:'1234', role:'student', classe:'A'},
      {id:'u_s3', name:'Carla Vidal',  email:'carla@alumnes.cat', pass:'1234', role:'student', classe:'A'},
      {id:'u_s4', name:'Dani Pons',    email:'dani@alumnes.cat',  pass:'1234', role:'student', classe:'A'},
      {id:'u_s5', name:'Èlia Mas',     email:'elia@alumnes.cat',  pass:'1234', role:'student', classe:'B'},
      {id:'u_s6', name:'Pol Roig',     email:'pol@alumnes.cat',   pass:'1234', role:'student', classe:'B'},
    ],
    groups:[
      {
        id:'g1', name:'Grup A · Investigació de mercat', subject:'Empresa i emprenedoria',
        teacherId:'u_prof', coordinatorId:'u_s1', memberIds:['u_s1','u_s2','u_s3','u_s4'],
        grade:8.0, method:1, evalActive:true, resultsPublished:false,
        tasks:[
          {id:'t1', title:'Dissenyar i llançar l\'enquesta', desc:'Crear el formulari i difondre\'l', points:35, assignedTo:'u_s1', status:'done'},
          {id:'t2', title:'Redactar el marc teòric', desc:'Fonamentació de la recerca', points:25, assignedTo:'u_s2', status:'done'},
          {id:'t3', title:'Analitzar dades i gràfics', desc:'Tractament estadístic', points:30, assignedTo:'u_s3', status:'partial'},
          {id:'t4', title:'Format, ortografia i conclusions', desc:'Revisió final', points:10, assignedTo:'u_s4', status:'pending'},
        ],
        messages:[
          {userId:'u_s1', text:'Hola equip! He activat la valoració amb el mètode del pressupost. Quan pugueu, repartiu els punts.', ts:Date.now()-3600000},
          {userId:'u_s2', text:'Fet! Bona feina amb l\'enquesta 👍', ts:Date.now()-1800000},
        ],
        evalData:{ m1:{}, m3:{} }
      },
      {
        id:'g2', name:'Grup B · Sessió d\'aquagym', subject:'Activitats aquàtiques',
        teacherId:'u_prof', coordinatorId:'u_s5', memberIds:['u_s5','u_s6'],
        grade:null, method:null, evalActive:false, resultsPublished:false,
        tasks:[], messages:[], evalData:{ m1:{}, m3:{} }
      }
    ]
  };
}

let state = {users:[], groups:[]};

/* ---------- HELPERS ---------- */
const $ = s=>document.getElementById(s);
const root = $('root');
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmt(n){ return (Math.round(n*10)/10).toFixed(1); }
function initials(name){ return name.split(' ').filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join(''); }
function userById(id){ return state.users.find(u=>u.id===id); }
function groupById(id){ return state.groups.find(g=>g.id===id); }
function me(){ return userById(SESSION); }
function timeAgo(ts){
  const d=Date.now()-ts, m=Math.floor(d/60000);
  if(m<1) return 'ara mateix'; if(m<60) return m+' min';
  const h=Math.floor(m/60); if(h<24) return h+' h'; return Math.floor(h/24)+' d';
}
const METHODS={
  1:{name:'Pressupost fix de punts', short:'Coavaluació quantitativa', ic:'🪙'},
  2:{name:'Barem per fites i pes de tasques', short:'Sistema àgil', ic:'🎯'},
  3:{name:'Matriu de rúbrica interna creuada', short:'Quali-quantitativa', ic:'📐'}
};
const CRITERIA=['Puntualitat','Qualitat','Iniciativa','Comunicació'];

/* role del usuari dins d'un grup concret */
function roleInGroup(uid, g){
  if(g.coordinatorId===uid) return 'coordinator';
  if(g.memberIds.includes(uid)) return 'student';
  return null;
}

/* ============================================================
   CÀLCUL DE RESULTATS PER MÈTODE
   ============================================================ */
function results(g){
  const members=g.memberIds.map(userById);
  const N=members.length, base=g.grade;
  const out=members.map(m=>({id:m.id,name:m.name,factor:null,final:null,detail:''}));

  if(g.method===1){
    const subs=g.evalData.m1||{};
    const evaluators=Object.keys(subs);
    out.forEach(o=>{
      const recv=evaluators.map(ev=>subs[ev][o.id]).filter(v=>typeof v==='number');
      if(recv.length){
        const avg=recv.reduce((a,b)=>a+b,0)/recv.length;
        o.factor=avg/100;
        o.recv=avg;
        o.detail=fmt(avg)+' pts (factor '+(Math.round(o.factor*100)/100)+')';
        if(base!=null) o.final=Math.max(0,Math.min(10, base*o.factor));
      }
    });
    out.evaluatorsCount=evaluators.length;
  }
  else if(g.method===3){
    const subs=g.evalData.m3||{};
    const evaluators=Object.keys(subs);
    out.forEach(o=>{
      let recv=0, nEval=0;
      evaluators.forEach(ev=>{
        if(ev===o.id) return;
        const arr=subs[ev] && subs[ev][o.id];
        if(arr){ recv+=arr.reduce((a,b)=>a+b,0); nEval++; }
      });
      if(nEval){
        const max=nEval*CRITERIA.length*4;
        o.factor=recv/max;
        o.detail=recv+'/'+max+' pts · '+Math.round(o.factor*100)+'%';
        if(base!=null) o.final=Math.max(0,Math.min(10, base*o.factor));
      }
    });
    out.evaluatorsCount=evaluators.length;
  }
  else if(g.method===2){
    const total=g.tasks.reduce((a,t)=>a+t.points,0);
    const ideal=N? total/N : 0;
    const sf={done:1,partial:.5,pending:0};
    out.forEach(o=>{
      const earned=g.tasks.filter(t=>t.assignedTo===o.id).reduce((a,t)=>a+t.points*sf[t.status],0);
      o.earned=earned;
      o.factor= ideal? Math.min(1, earned/ideal) : 0;
      o.detail=fmt(earned)+'/'+fmt(ideal)+' pts d\'esforç';
      if(base!=null) o.final=Math.max(0,Math.min(10, base*o.factor));
    });
    out.ideal=ideal; out.total=total;
  }
  return out;
}
function evalProgress(g){
  if(g.method===1) return Object.keys(g.evalData.m1||{}).length;
  if(g.method===3) return Object.keys(g.evalData.m3||{}).length;
  return null;
}

  const lines=$('im-data').value.split('\n').map(l=>l.trim()).filter(Boolean);
  if(!lines.length){ alert('No has enganxat cap nom.'); return; }
  const existing=new Set(state.users.map(u=>u.email.toLowerCase()));
  let added=0, skipped=0, i=0;
  lines.forEach(line=>{
    const parts=line.split(/[\t,;]+/).map(s=>s.trim()).filter(Boolean);
    const name=parts[0];
    if(!name){ skipped++; return; }
    let email=(parts[1]||slugEmail(name,domain)).toLowerCase();
    if(existing.has(email)){ skipped++; return; }
    existing.add(email);
    state.users.push({id:'u_'+Date.now()+'_'+(i++), name, email, pass, role:'student', classe:cls});
    added++;
  });
  save(); closeModal();
  alert('Importació completada.\nAfegits: '+added+'\nOmesos (duplicats/buits): '+skipped);
  render();
}

let groupTab='resum';
function renderGroup(m,u){
  const g=groupById(ctx.gid);
  if(!g){ go('home'); return; }
  const r = (u.role==='admin'||u.role==='teacher') ? u.role : roleInGroup(u.id,g);
  if(!r){ m.innerHTML=emptyBox('No tens accés a aquest grup.'); return; }
  const isCoord = r==='coordinator';
  const isTeacher = (u.role==='teacher'&&g.teacherId===u.id);
  const isAdmin = u.role==='admin';
  const manage = isTeacher||isAdmin;

  const banners={
    admin:['rb-admin','🛠️ Administració'],
    teacher:['rb-teacher','👩‍🏫 Professorat'],
    coordinator:['rb-coord','⭐ Coordinador/a'],
    student:['rb-student','🎓 Alumnat']
  };
  const b=banners[r];

  // pestanyes segons rol
  let tabs=[['resum','Resum'],['tasques','Tasques'],['chat','Xat intern']];
  if(g.evalActive || manage || isCoord) tabs.push(['valoracio','Valoració']);
  if(manage || isCoord) tabs.push(['resultats','Resultats']);
  if(!manage && !isCoord && g.resultsPublished && !g.evalActive) tabs.push(['resultats','La meva nota']);

function hasEvaluations(g){
  return Object.keys(g.evalData.m1||{}).length > 0 ||
         Object.keys(g.evalData.m3||{}).length > 0;
}
function evalControlPanel(g, isCoord, isManage){
  const locked = isCoord ? g.evalActive : hasEvaluations(g);
  const lockMsg = isCoord
    ? 'Un cop activada la valoració, només el professor pot canviar el mètode.'
    : 'Ja hi ha valoracions enviades; el mètode no es pot canviar.';
  const methodPick = locked
    ? `<div class="method-pick">
        ${[1,2,3].map(n=>`<div class="method-opt ${g.method===n?'sel':''}" style="opacity:.6;cursor:default">
          <b>${METHODS[n].ic} Mètode ${n}: ${METHODS[n].name} <span class="badge">${METHODS[n].short}</span> ${g.method===n?'<span class="tag tag-green" style="padding:1px 8px">✓ triat</span>':''}</b>
          <p>${methodBlurb(n)}</p></div>`).join('')}
      </div>
      <div class="notice n-warn" style="margin-top:10px"><span class="ic">🔒</span><div>${lockMsg}</div></div>`
    : `<div class="method-pick">
        ${[1,2,3].map(n=>`<div class="method-opt ${g.method===n?'sel':''}" onclick="pickMethod('${g.id}',${n})">
          <b>${METHODS[n].ic} Mètode ${n}: ${METHODS[n].name} <span class="badge">${METHODS[n].short}</span> ${g.method===n?'<span class="tag tag-green" style="padding:1px 8px">✓ triat</span>':''}</b>
          <p>${methodBlurb(n)}</p></div>`).join('')}
      </div>`;
  return `<div class="card" style="margin-top:18px;border:1.5px solid var(--coral)">
    <h3>${isCoord?'⭐ Panell del coordinador/a':'🎚️ Configuració de la valoració'}</h3>
    <div class="desc">Tria <b>quin dels tres mètodes</b> es farà servir i obre o tanca la valoració anònima de l'equip.</div>
    ${methodPick}
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:16px">
      <button class="btn ${g.evalActive?'btn-danger':'btn-coral'} btn-sm" onclick="toggleEval('${g.id}')" ${!g.method?'disabled style="opacity:.5;cursor:not-allowed"':''}>
        ${g.evalActive?'⏹ Tancar valoració':'▶ Activar valoració'}</button>
      ${!g.method?'<span class="help" style="align-self:center">Tria primer un mètode.</span>':(!g.evalActive?'<span class="help" style="align-self:center">Mètode triat. Activa la valoració quan vulguis.</span>':'')}
    </div>
  </div>`;
}
function methodBlurb(n){
  return {
    1:'Cada membre reparteix de forma anònima una bossa de '+'(N×100) punts entre l\'equip. La mitjana rebuda marca el factor de la nota.',
    2:'L\'equip desglossa les tasques amb un pes d\'esforç. La nota individual depèn de les tasques completades (gestiona-les a la pestanya Tasques).',
    3:'Cada membre puntua els altres de l\'1 al 4 en 4 criteris (puntualitat, qualitat, iniciativa, comunicació). El % obtingut ajusta la nota.'
  }[n];
}
function pickMethod(gid,n){
  const g=groupById(gid);
  if(g.method===n) return;
  const u=me();
  const isCoord=roleInGroup(u.id,g)==='coordinator';
  const isManage=(u.role==='teacher'||u.role==='admin');
  if(isCoord && g.evalActive){
    alert('Un cop activada la valoració, el mètode només el pot canviar el professor.');
    return;
  }
  if(isManage && hasEvaluations(g)){
    alert('Ja hi ha valoracions enviades. El mètode no es pot modificar.');
    return;
  }
  if(g.evalActive){
    if(!confirm('Cal tancar la valoració per canviar de mètode. Continuar?')) return;
    g.evalActive=false;
  }
  g.method=n; save(); render();
}
function toggleEval(gid){
  const g=groupById(gid);
  if(!g.method){ alert('Tria un mètode primer.'); return; }
  if(!g.evalActive && g.method===2 && g.tasks.length===0){ if(!confirm('No hi ha tasques definides. Vols obrir igualment?')) return; }
  g.evalActive=!g.evalActive; save(); render();
}

function methodTwoHint(g){
  const total=g.tasks.reduce((a,t)=>a+t.points,0);

}
function cycleStatus(gid,tid){
  const t=groupById(gid).tasks.find(x=>x.id===tid);

function delTask(gid,tid){ const g=groupById(gid); g.tasks=g.tasks.filter(t=>t.id!==tid); save(); render(); }
function taskModal(gid,tid){
  const g=groupById(gid); const t=tid?g.tasks.find(x=>x.id===tid):null;
  openModal(`
    <h2>${t?'Editar tasca':'Nova tasca'}</h2><div class="msub">Assigna-la a un membre i, si fas servir el mètode àgil, dóna-li un pes d'esforç.</div>

      <div class="f-row">

          <option value="">— ningú —</option>
          ${g.memberIds.map(id=>{const x=userById(id);return `<option value="${id}" ${t&&t.assignedTo===id?'selected':''}>${esc(x.name)}</option>`;}).join('')}</select></div>

function saveTask(gid,tid){
  const g=groupById(gid);
  const title=$('tf-title').value.trim();

  else { g.tasks.push({id:'t_'+Date.now(),status:'pending',...data}); }

      <div class="field"><label>Destinataris</label>
        <div style="display:flex;flex-direction:column;gap:6px;margin-top:4px">
        ${g.memberIds.map(id=>{const x=userById(id);return `<label style="display:flex;gap:8px;align-items:center;font-size:13.5px"><input type="checkbox" class="ml-to" value="${esc(x.email)}" checked> ${esc(x.name)} <small style="color:var(--ink-soft)">${esc(x.email)}</small></label>`;}).join('')}
        </div></div>
      <div class="field"><label>Assumpte</label><input id="ml-subj" value="[${esc(g.name)}] "></div>
      <div class="field"><label>Missatge</label><textarea id="ml-body" rows="4" placeholder="Escriu el teu missatge..."></textarea></div>
    </div>
    <div class="modal-foot"><button class="btn btn-ghost btn-sm" onclick="closeModal()">Cancel·la</button>
      <button class="btn btn-primary btn-sm" style="width:auto" onclick="sendMail()">Obrir correu</button></div>`);
}
function sendMail(){
  const to=[...document.querySelectorAll('.ml-to:checked')].map(c=>c.value).join(',');
  const subj=encodeURIComponent($('ml-subj').value);
  const body=encodeURIComponent($('ml-body').value);
  if(!to){alert('Tria almenys un destinatari.');return;}
  const url=`mailto:${to}?subject=${subj}&body=${body}`;
  const a=document.createElement('a'); a.href=url; a.target='_blank'; a.rel='noopener';
  document.body.appendChild(a); a.click(); a.remove();
  closeModal();
}

/* ----- VALORACIÓ (formulari anònim) ----- */
function tabValoracio(c,g,u,r,p){
  if(!g.method){ c.innerHTML=`<div class="notice n-warn"><span class="ic">⚠️</span><div>El/la coordinador/a encara no ha triat cap mètode de valoració.</div></div>`; return; }
  if(g.method===2){
    c.innerHTML=`<div class="notice n-info"><span class="ic">🎯</span><div>Aquest grup fa servir el <b>mètode àgil</b>: no hi ha votació entre companys. La nota surt de les <b>tasques completades</b>. Consulta-les a la pestanya <b>Tasques</b> i els <b>Resultats</b>.</div></div>`;
    return;
  }
  if(!g.evalActive){ c.innerHTML=`<div class="notice n-warn"><span class="ic">🔒</span><div>La valoració està tancada. ${p.isCoord?'Obre-la des del panell del coordinador (pestanya Resum).':'Espera que el/la coordinador/a l\'obri.'}</div></div>`; return; }

  // només els membres del grup voten; professorat/admin veuen el formulari deshabilitat
  const isMember = g.memberIds.includes(u.id);
  if(!isMember){ c.innerHTML=`<div class="notice n-info"><span class="ic">👀</span><div>Ets professorat/administració: la votació la fan els membres del grup. Pots veure el progrés i els resultats a les seves pestanyes.</div></div>`; return; }

  if(g.method===1) renderM1Form(c,g,u);
  if(g.method===3) renderM3Form(c,g,u);
}
function renderM1Form(c,g,u){
  const N=g.memberIds.length, bag=N*100;
  const prev=(g.evalData.m1||{})[u.id]||{};
  const done = !!(g.evalData.m1||{})[u.id];
  c.innerHTML=`
    <div class="card">
      <h3>🪙 Repartiment de la bossa de punts</h3>
      <div class="desc">Tens <b>${bag} punts</b> per repartir entre tot l'equip (tu inclòs/osa). Premia qui ha treballat més. La suma ha de ser exactament ${bag}.</div>
      ${done?'<div class="notice n-ok"><span class="ic">✅</span><div>Ja has enviat la teva valoració. Pots modificar-la i tornar a enviar.</div></div>':''}
      <table class="evtable">
        <tr><th>Membre</th><th style="text-align:right">Punts assignats</th></tr>
        ${g.memberIds.map(id=>{const x=userById(id);return `<tr><td>${esc(x.name)} ${id===u.id?'<span class="tag tag-grey">tu</span>':''}</td>
          <td style="text-align:right"><input class="m1-in points-in" data-id="${id}" type="number" min="0" value="${prev[id]!=null?prev[id]:Math.round(bag/N)}" oninput="m1Sum(${bag})"></td></tr>`;}).join('')}
      </table>
      <div id="m1meter" class="budget-meter"></div>
      <button id="m1btn" class="btn btn-primary" onclick="submitM1('${g.id}',${bag})">Enviar valoració anònima</button>
    </div>`;
  m1Sum(bag);
}
function m1Sum(bag){
  const ins=[...document.querySelectorAll('.m1-in')];
  const sum=ins.reduce((a,i)=>a+(parseInt(i.value)||0),0);
  const meter=$('m1meter'), btn=$('m1btn');
  const ok=sum===bag;
  meter.className='budget-meter '+(ok?'ok':'bad');
  meter.innerHTML=`<span>${ok?'✅ Repartiment correcte':'Suma actual'}</span><span>${sum} / ${bag} punts</span>`;
  if(btn){ btn.disabled=!ok; btn.style.opacity=ok?'1':'.5'; btn.style.cursor=ok?'pointer':'not-allowed'; }
}
function submitM1(gid,bag){
  const g=groupById(gid); const obj={};
  let sum=0;
  document.querySelectorAll('.m1-in').forEach(i=>{const v=parseInt(i.value)||0;obj[i.dataset.id]=v;sum+=v;});
  if(sum!==bag){alert('La suma ha de ser exactament '+bag+'.');return;}
  g.evalData.m1=g.evalData.m1||{}; g.evalData.m1[me().id]=obj;
  persistEval(gid, 1, obj);
  alert('Valoració enviada de forma anònima. Gràcies!'); render();
}
function renderM3Form(c,g,u){
  const others=g.memberIds.filter(id=>id!==u.id);
  const prev=(g.evalData.m3||{})[u.id]||{};
  const done=!!(g.evalData.m3||{})[u.id];
  c.innerHTML=`
    <div class="card">
      <h3>📐 Rúbrica interna</h3>
      <div class="desc">Puntua cada company/a de l'1 al 4 en cada criteri. No et valores a tu mateix/a.</div>
      <div class="scale-legend"><b>4</b> Excel·lent · <b>3</b> Bo · <b>2</b> Regular · <b>1</b> Deficient</div>
      ${done?'<div class="notice n-ok"><span class="ic">✅</span><div>Ja has enviat la teva valoració. Pots modificar-la i tornar a enviar.</div></div>':''}
      ${others.map(id=>{const x=userById(id);const pv=prev[id]||[0,0,0,0];
        return `<div class="card" style="box-shadow:none;border:1px solid var(--line);margin-bottom:12px">
          <b style="font-size:15px">${esc(x.name)}</b>
          <table class="evtable" style="margin-top:8px">
          ${CRITERIA.map((cr,ci)=>`<tr><td>${cr}</td><td style="text-align:right"><div class="crit-cell" style="justify-content:flex-end">
            ${[1,2,3,4].map(v=>`<button class="m3b ${pv[ci]===v?'sel':''}" data-t="${id}" data-c="${ci}" data-v="${v}" onclick="m3Pick(this)">${v}</button>`).join('')}
          </div></td></tr>`).join('')}
          </table></div>`;}).join('')}
      <button class="btn btn-primary" onclick="submitM3('${g.id}')">Enviar valoració anònima</button>
    </div>`;
}
function m3Pick(btn){
  document.querySelectorAll(`.m3b[data-t="${btn.dataset.t}"][data-c="${btn.dataset.c}"]`).forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
}
function submitM3(gid){
  const g=groupById(gid); const u=me();
  const others=g.memberIds.filter(id=>id!==u.id);
  const obj={};
  let complete=true;
  others.forEach(id=>{
    const arr=[0,0,0,0];
    CRITERIA.forEach((_,ci)=>{
      const sel=document.querySelector(`.m3b.sel[data-t="${id}"][data-c="${ci}"]`);
      if(sel) arr[ci]=parseInt(sel.dataset.v); else complete=false;
    });
    obj[id]=arr;
  });
  if(!complete){alert('Has de puntuar tots els criteris de tots els companys.');return;}
  g.evalData.m3=g.evalData.m3||{}; g.evalData.m3[u.id]=obj;
  persistEval(gid, 3, obj);
  alert('Valoració enviada de forma anònima. Gràcies!'); render();
}
/* desa un vot a la full de càlcul (upsert d'una sola fila, amb bloqueig) */
function persistEval(gid, method, payload){
  gasPost({ action:'submitEvaluation', groupId:gid, method:method, evaluatorId:me().id, payloadJson:JSON.stringify(payload) })
    .then(syncState).catch(persistErr);
}

/* ----- RESULTATS ----- */
function tabResultats(c,g,u,p){
  // Vista d'alumne regular: només la seva pròpia nota
  if(!p.manage && !p.isCoord){
    if(!g.resultsPublished || g.evalActive){
      c.innerHTML=`<div class="notice n-warn"><span class="ic">⏳</span><div>Els resultats encara no estan disponibles. El professor els publicarà quan l'avaluació hagi finalitzat.</div></div>`;
      return;
    }
    if(!g.method){ c.innerHTML=`<div class="notice n-warn"><span class="ic">⚠️</span><div>El mètode d'avaluació no s'ha configurat.</div></div>`; return; }
    const res=results(g);
    const myRow=res.find(r=>r.id===u.id);
    c.innerHTML=`<div class="notice n-info"><span class="ic">${METHODS[g.method].ic}</span><div><b>${METHODS[g.method].name}</b> · Nota base del treball: <b>${g.grade!=null?fmt(g.grade):'—'}/10</b>. Tots els vots van ser anònims.</div></div>
      <div class="card" style="max-width:420px;margin-top:12px">
        <h3 style="margin-bottom:12px">La teva nota</h3>
        <div style="font-size:15px;margin-bottom:6px"><b>${esc(u.name)}</b></div>
        <div class="help" style="margin-bottom:12px">${myRow&&myRow.detail?myRow.detail:'Sense valoracions rebudes.'}</div>
        <div style="font-size:28px;font-weight:800;color:var(--teal)">${myRow&&myRow.final!=null?fmt(myRow.final)+' / 10':'—'}</div>
      </div>`;
    return;
  }
  if(!g.method){ c.innerHTML=`<div class="notice n-warn"><span class="ic">⚠️</span><div>Encara no hi ha cap mètode configurat.</div></div>`; return; }
  if(g.grade==null){ c.innerHTML=`<div class="notice n-warn"><span class="ic">📝</span><div>El professorat encara no ha posat la <b>nota base</b> del treball. Els resultats es calcularan automàticament quan ho faci.</div></div>`; }
  const res=results(g);
  const head=`<div class="notice n-info"><span class="ic">${METHODS[g.method].ic}</span><div><b>${METHODS[g.method].name}</b> · Nota base del treball: <b>${g.grade!=null?fmt(g.grade):'—'}/10</b>. Tots els vots són anònims; aquí només es mostren els resultats agregats.</div></div>`;

  let table='';
  if(g.method===2){
    table=`<table class="evtable">
      <tr><th>Membre</th><th>Esforç completat</th><th>Compliment</th><th style="text-align:right">Nota final</th></tr>
      ${res.map(o=>`<tr><td>${esc(o.name)}</td><td>${o.detail}</td>
        <td style="width:160px"><div class="bar"><i style="width:${Math.round((o.factor||0)*100)}%"></i></div></td>
        <td class="num" style="text-align:right">${o.final!=null?fmt(o.final):'—'}</td></tr>`).join('')}
    </table>
    <div class="help">Ideal equitatiu: ${fmt(res.ideal||0)} pts/persona · Esforç total: ${res.total||0} pts.</div>`;
  } else {
    const prog=evalProgress(g);
    table=`<div class="help" style="margin-bottom:10px">Valoracions rebudes: <b>${prog}/${g.memberIds.length}</b> membres.</div>
    <table class="evtable">
      <tr><th>Membre</th><th>Detall (anònim, agregat)</th><th>Factor</th><th style="text-align:right">Nota final</th></tr>
      ${res.map(o=>`<tr><td>${esc(o.name)}</td><td>${o.detail||'<span class="tag tag-grey">sense valoracions</span>'}</td>
        <td>${o.factor!=null?(Math.round(o.factor*100)/100):'—'}</td>
        <td class="num" style="text-align:right">${o.final!=null?fmt(o.final):'—'}</td></tr>`).join('')}
    </table>`;
  }
  c.innerHTML=`${head}
    <div style="text-align:right;margin-bottom:10px"><button class="btn btn-ghost btn-sm" onclick="refreshNow()">↻ Actualitza resultats</button></div>
    <div class="card">${table}</div>
    ${p.manage?`<div class="help" style="margin-top:14px">${g.resultsPublished?'✅ Resultats publicats: l\'alumnat veu la seva nota.':'Recorda <b>publicar</b> els resultats (pestanya Resum) perquè l\'alumnat els vegi.'}</div>`:''}`;
}

/* ============================================================
   MODALS
   ============================================================ */
function openModal(html,extra=''){
  const o=document.createElement('div'); o.className='overlay'; o.id='ovl';
  o.innerHTML=`<div class="modal ${extra}">${html}</div>`;
  o.addEventListener('click',e=>{if(e.target===o)closeModal();});
  document.body.appendChild(o);
}
function closeModal(){ const o=$('ovl'); if(o)o.remove(); }

/* ---------- PRIMER ACCÉS: contrasenya predeterminada ---------- */
function firstLoginModal(uid){
  openModal(`
    <h2>Benvingut/da! 👋</h2>
    <div class="msub">La teva contrasenya és la predeterminada <b>(1234)</b>. Et recomanem canviar-la per una de més segura.</div>
    <div class="field"><label>Nova contrasenya</label><input id="fl-new" type="password" placeholder="Mínim 4 caràcters" autocomplete="new-password"></div>
    <div class="field"><label>Confirmar contrasenya</label><input id="fl-conf" type="password" placeholder="Repeteix la contrasenya" autocomplete="new-password"></div>
    <div id="fl-err" style="color:var(--coral);font-size:13px;min-height:18px"></div>
    <div class="modal-foot">
      <button class="btn btn-ghost btn-sm" onclick="closeModal()">Ara no</button>
      <button class="btn btn-primary btn-sm" style="width:auto" onclick="saveFirstPass('${uid}')">Canviar contrasenya</button>
    </div>`);
}
function saveFirstPass(uid){
  const np=$('fl-new').value, nc=$('fl-conf').value, err=$('fl-err');
  if(np.length<4){ err.textContent='La contrasenya ha de tenir mínim 4 caràcters.'; return; }
  if(np!==nc){ err.textContent='Les contrasenyes no coincideixen.'; return; }
  const u=state.users.find(x=>x.id===uid);
  u.pass=np; save(); closeModal();
}

/* ---------- PERFIL ---------- */
function renderProfile(m,u){
  m.innerHTML=`
  <div class="page-wrap">
    <div class="page-head"><div><div class="crumb">Compte</div><h1>El meu perfil</h1></div></div>
    <div class="card" style="max-width:480px">
      <h3 style="margin-bottom:16px;font-size:17px">Dades personals</h3>
      <div class="field"><label>Nom complet</label><input id="pf-name" value="${esc(u.name)}" placeholder="Nom i cognoms"></div>
      <div class="field"><label>Correu electrònic</label><input id="pf-email" type="email" value="${esc(u.email)}" placeholder="correu@institut.cat" autocomplete="username"></div>
      <div style="border-top:1px solid var(--line);margin:22px 0 18px"></div>
      <h3 style="margin-bottom:16px;font-size:17px">Canviar contrasenya</h3>
      <div class="help" style="margin-bottom:14px">Deixa els camps buits si no vols canviar la contrasenya.</div>
      <div class="field"><label>Contrasenya actual</label><input id="pf-cur" type="password" placeholder="••••" autocomplete="current-password"></div>
      <div class="field"><label>Nova contrasenya</label><input id="pf-new" type="password" placeholder="Mínim 4 caràcters" autocomplete="new-password"></div>
      <div class="field"><label>Confirmar nova contrasenya</label><input id="pf-conf" type="password" placeholder="Repeteix la nova contrasenya" autocomplete="new-password"></div>
      <div id="pf-msg" style="font-size:13px;min-height:18px;margin-top:4px"></div>
      <div style="margin-top:20px"><button class="btn btn-primary" onclick="saveProfile()" style="width:auto;min-width:160px">Desar canvis</button></div>
    </div>
  </div>`;
}
function saveProfile(){
  const u=me();
  const name=$('pf-name').value.trim();
  const email=$('pf-email').value.trim().toLowerCase();
  const cur=$('pf-cur').value, np=$('pf-new').value, nc=$('pf-conf').value;
  const msg=$('pf-msg');
  const err=t=>{ msg.style.color='var(--coral)'; msg.textContent=t; };
  const ok=t=>{ msg.style.color='var(--teal)'; msg.textContent=t; };

  if(!name) return err('El nom no pot estar buit.');
  if(!email) return err('El correu no pot estar buit.');
  if(email!==u.email.toLowerCase()){
    if(state.users.find(x=>x.id!==u.id&&x.email.toLowerCase()===email))
      return err('Aquest correu ja l\'utilitza un altre usuari.');
  }
  if(cur||np||nc){
    if(cur!==u.pass) return err('La contrasenya actual no és correcta.');
    if(np.length<4) return err('La nova contrasenya ha de tenir mínim 4 caràcters.');
    if(np!==nc) return err('Les contrasenyes no coincideixen.');
    u.pass=np;
  }
  u.name=name; u.email=email;
  save(); render(); ok('✓ Perfil desat correctament.');
}

function resetDemo(){
  if(!confirm('Restaurar totes les dades de demostració? Es perdran els canvis.')) return;
  gasGet('resetDemo').then(s=>{state=s;view='home';render();}).catch(persistErr);
}

/* ---------- ARRENCADA ---------- */
function loadingScreen(){
  return `<div style="min-height:100vh;display:grid;place-items:center;color:var(--ink-soft)">
    <div style="text-align:center">
      <div style="font-family:'Bricolage Grotesque';font-weight:800;font-size:22px;color:var(--teal);margin-bottom:10px">Repartiment de punts</div>
      <div class="spin" style="width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--teal);border-radius:50%;margin:0 auto;animation:sp 1s linear infinite"></div>
      <style>@keyframes sp{to{transform:rotate(360deg)}}</style>
      <p style="margin-top:14px;font-size:14px">Carregant dades de la full de càlcul…</p>
    </div></div>`;
}
function errScreen(e){
  return `<div style="min-height:100vh;display:grid;place-items:center;padding:24px">
    <div class="card" style="max-width:440px;text-align:center">
      <h3>No s'han pogut carregar les dades</h3>
      <p class="desc">${esc(e&&e.message?e.message:e)}</p>
      <button class="btn btn-primary" onclick="boot()" style="margin-top:8px">Tornar a provar</button>
    </div></div>`;
}
function boot(){
  root.innerHTML = loadingScreen();
  const timeout = setTimeout(()=>{
    root.innerHTML = errScreen({message:'Temps d\'espera exhaurit. Comprova la connexió i torna a provar.'});
  }, 20000);
  gasGet('loadState')
    .then(s=>{ clearTimeout(timeout); state=s; render(); })
    .catch(e=>{ clearTimeout(timeout); root.innerHTML=errScreen(e); });
}
boot();
</script>
</body>
</html>
